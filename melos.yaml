name: genie_coder_monorepo
repository: https://github.com/GenieCoderSrc/genie_coder_monorepo

packages:
  - "packages/**"

# -----------------------------
# Commands and Versioning
# -----------------------------
command:
  version:
    linkToCommits: true
    updateGitTagRefs: true
    workspaceChangelog: false

    changelog:
      # CHANGED: Lowered the heading levels to '####' so they cascade
      # cleanly beneath Melos's default combined version/date string.
      headings:
        chore: "#### ✨ Updated"
        refactor: "#### ✨ Updated"
        feat: "#### 🚀 Added"
        fix: "#### 🐛 Fixed"
        docs: "#### 📝 Documentation"

      includeCommitTypes:
        - chore
        - refactor
        - feat
        - fix
        - docs

  bootstrap:
    runPubGetInParallel: true

# -----------------------------
# Useful Scripts
# -----------------------------
scripts:
  analyze:
    run: flutter analyze

  format:
    run: dart format .

  test:
    run: flutter test --coverage
